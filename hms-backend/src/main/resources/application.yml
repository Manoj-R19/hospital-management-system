server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Amrita@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        
  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: true
    ignore-migration-patterns: "*:ignored"
    clean-disabled: false

    clean-on-validation-error: false
    validate-on-migrate: false


  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-256-bit-key-here-must-be-very-long-for-hs256}
    expiry-ms: 86400000       # 24 hours
    refresh-expiry-ms: 604800000  # 7 days

  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    allowed-types: pdf,jpg,jpeg,png

  reminder:
    poll-interval-minutes: 1
    notification-window-minutes: 5
